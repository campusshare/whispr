<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Secure video evidence feed on Whispr.">
    <title>Video Evidence — Whispr</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Force strict black background and hidden body scroll for Reels */
        body {
            background: #000000;
            overflow: hidden;
        }

        .nav {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Like button active state */
        .engage-btn--like.liked svg {
            fill: #FF453A;
            stroke: #FF453A;
        }

        .engage-btn--like.liked {
            color: #FF453A;
        }

        /* Pop animation */
        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.35);
            }

            100% {
                transform: scale(1);
            }
        }

        .reel-action.pop {
            animation: pop 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="assets/images/whisprlogo.png">
</head>

<body class="has-bottom-nav videos-page">

    <nav class="nav">
        <div class="nav__inner">
            <a href="index.html" class="nav__logo" style="gap: 12px; align-items: center; text-decoration: none;">
                <img src="assets/images/whisprlogo.png" alt="Whispr Logo"
                    style="height: 48px; width: auto; object-fit: contain;">
                <span
                    style="font-weight: 900; letter-spacing: -0.02em; color: #ffffff; font-size: 1.6rem;">Whispr</span>
            </a>
            <div class="nav__links">
                <a href="feed.html" class="nav__link">Feed</a>
                <a href="videos.html" class="nav__link active">Videos</a>
                <a href="new-report.html" class="nav__link">Report</a>
                <a href="messages.html" class="nav__link">Messages</a>
                <a href="transparency.html" class="nav__link">Transparency</a>
            </div>
                        <div class="nav__actions">
                <div class="security-bar" style="background: rgba(10, 132, 255, 0.1); border-color: rgba(10, 132, 255, 0.3); color: #0A84FF;">
                    <span class="dot" style="background: #0A84FF;"></span> <span class="hide-mobile">Encrypted</span> Feed
                </div>

                <!-- Logged out: show sign in button -->
                <a href="auth.html" class="btn btn--primary btn--sm" id="nav-signin-btn" data-auth-show="loggedOut"
                   style="font-size:.82rem;padding:7px 16px;">
                    Join Whispr
                </a>

                <!-- Logged in: show alias badge + sign out -->
                <div data-auth-show="loggedIn" style="display:flex;align-items:center;gap:10px;">
                    <a href="profile.html" id="nav-user-badge"
                       style="display:flex;align-items:center;gap:8px;text-decoration:none;background:rgba(255,255,255,0.07);padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.09);cursor:pointer;transition:background .2s;">
                        <span id="nav-avatar" style="font-size:1.1rem;line-height:1;">🦅</span>
                        <span id="nav-alias" style="font-size:.85rem;font-weight:700;color:#fff;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
                    </a>
                    <button id="nav-signout-btn" aria-label="Sign out"
                        style="background:rgba(255,69,58,0.12);border:1px solid rgba(255,69,58,0.25);color:#FF453A;border-radius:20px;padding:6px 14px;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .2s;">
                        Sign Out
                    </button>
                </div>

                <button class="nav__hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <button id="global-mute-btn" class="reel-mute" aria-label="Toggle sound"
        style="top: calc(var(--nav-height) + 16px); z-index: 100;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
            width="20" height="20">
            <path stroke-linecap="round" stroke-linejoin="round"

            <path stroke-linecap="round" stroke-linejoin="round" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
        </svg>
    </button>

    </main>

        <a href="videos.html" class="bottom-nav__item active">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14M3 8h8a2 2 0 012 2v4a2 2 0 01-2 2H3a2 2 0 01-2-2v-4a2 2 0 012-2z" />
